name: Build Android APK

on:
  push:
    branches: [ main, master ] # O robô vai trabalhar sempre que você der push nessas branches

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Java (necessário para Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: npm install

      - name: Gerar Build do React
        run: npm run build

      - name: Sincronizar com Capacitor
        run: |
          npx cap sync android

      - name: Dar permissão ao Gradle (o motor do Android)
        run: chmod +x android/gradlew
        working-directory: android

      - name: Construir APK (Debug)
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload do APK final
        uses: actions/upload-artifact@v4
        with:
          name: BusMur-App
          path: android/app/build/outputs/apk/debug/app-debug.apk